// ============================================
// CS2 AUTOEXEC - OPTIMIZACIÓN EXTREMA 300+ FPS
// RTX 2060 | i5 8th Gen | 16GB RAM
// ============================================
// UBICACIÓN: Steam\steamapps\common\Counter-Strike Global Offensive\game\csgo\cfg\autoexec.cfg
// ============================================

// ========== NETWORK SETTINGS ==========
rate 786432                 // Max bandwidth (128 tick)
cl_updaterate 128           // Updates por segundo del servidor
cl_cmdrate 128              // Comandos por segundo al servidor
cl_interp 0                 // Interpolación mínima
cl_interp_ratio 1           // Ratio de interpolación
mm_dedicated_search_maxping 50  // Máximo ping en matchmaking

// ========== FPS SETTINGS ==========
fps_max 0                   // Sin límite de FPS (usa 300 si tienes microstutters)
fps_max_ui 0                // Sin límite en menús
engine_low_latency_sleep_after_client_tick true  // Reduce latencia

// ========== MOUSE SETTINGS ==========
sensitivity 1.0             // Ajusta a tu preferencia
zoom_sensitivity_ratio_mouse 1.0
m_rawinput 1                // Raw input ON (crítico)
m_customaccel 0             // Sin aceleración
m_mouseaccel1 0
m_mouseaccel2 0

// ========== AUDIO SETTINGS ==========
snd_mixahead 0.05           // Reduce latencia de audio
snd_headphone_pan_exponent 2
snd_headphone_pan_radial_weight 1
snd_mute_losefocus 0        // Audio activo cuando alt-tab
volume 0.5                  // Volumen maestro
voice_scale 0.4             // Volumen de voz

// ========== VIDEO PERFORMANCE ==========
mat_queue_mode 2            // Multi-threaded rendering
r_dynamic 0                 // Luces dinámicas OFF (más FPS)
r_drawtracers_firstperson 0 // Sin tracers en primera persona
cl_disable_ragdolls 0       // Ragdolls ON (no da ventaja desactivar en CS2)
cl_showfps 1                // Mostrar FPS (1=básico, 2=avanzado)

// ========== VIEWMODEL ==========
viewmodel_fov 68
viewmodel_offset_x 2.5
viewmodel_offset_y 0
viewmodel_offset_z -1.5
viewmodel_recoil 0
cl_viewmodel_shift_left_amt 0
cl_viewmodel_shift_right_amt 0
viewmodel_presetpos 3

// ========== CROSSHAIR ==========
cl_crosshairstyle 4         // Estático (cambiar a 5 para clásico dinámico)
cl_crosshairsize 2
cl_crosshairgap -2
cl_crosshairthickness 0.5
cl_crosshair_drawoutline 1
cl_crosshair_outlinethickness 1
cl_crosshaircolor 1         // Verde (1=verde, 2=amarillo, 4=cyan, 5=custom)
cl_crosshairalpha 255
cl_crosshairdot 0
cl_crosshair_sniper_width 1

// ========== HUD ==========
hud_scaling 0.85            // Escala del HUD (más pequeño = mejor visibilidad)
cl_hud_color 5              // Color HUD (1-10)
cl_radar_scale 0.35         // Escala del radar
cl_radar_always_centered 0  // Radar centrado en jugador
cl_radar_icon_scale_min 0.6
cl_hud_playercount_pos 0    // Posición contador jugadores
cl_hud_playercount_showcount 1
safezonex 1.0               // Ajuste de zona segura
safezoney 1.0

// ========== BINDS ÚTILES ==========
bind "tab" "+showscores"
bind "capslock" "noclip"    // Noclip para práctica (no funciona en comp)
bind "kp_minus" "volume 0"  // Silenciar audio rápido
bind "kp_plus" "volume 0.5" // Restaurar volumen

// ========== NET GRAPH ==========
net_graph 1                 // Mostrar info de red (0 para ocultar)
net_graphproportionalfont 0 // Fuente pequeña

// ========== PRELOAD ==========
cl_forcepreload 1           // Precargar texturas (reduce stutters)

// ========== PRACTICE CONFIG (OPCIONAL) ==========
alias "prac" "sv_cheats 1; mp_autoteambalance 0; mp_limitteams 0; mp_roundtime 60; mp_roundtime_defuse 60; mp_maxmoney 65535; mp_startmoney 65535; mp_buytime 9999; mp_buy_anywhere 1; mp_freezetime 0; sv_infinite_ammo 1; ammo_grenade_limit_total 5; sv_grenade_trajectory 1; sv_grenade_trajectory_time 10; sv_showimpacts 1; sv_showimpacts_time 10; mp_restartgame 1"

// ========== BUY BINDS (OPCIONAL) ==========
// bind "kp_ins" "buy vesthelm; buy vest"           // 0 - Kevlar
// bind "kp_del" "buy defuser"                      // . - Defuse
// bind "kp_end" "buy ak47; buy m4a1"               // 1 - AK/M4
// bind "kp_downarrow" "buy awp"                    // 2 - AWP
// bind "kp_pgdn" "buy deagle"                      // 3 - Deagle
// bind "kp_leftarrow" "buy smokegrenade"           // 4 - Smoke
// bind "kp_5" "buy flashbang"                      // 5 - Flash
// bind "kp_rightarrow" "buy hegrenade"             // 6 - HE
// bind "kp_home" "buy molotov; buy incgrenade"     // 7 - Molotov

// ========== JUMPTHROW BIND (Ahora legal en CS2) ==========
alias "+jumpthrow" "+jump; -attack; -attack2"
alias "-jumpthrow" "-jump"
bind "x" "+jumpthrow"

// ========== CLEAR DECALS ==========
bind "shift" "+sprint; r_cleardecals"  // Limpiar sangre al caminar

// ========== PERFORMANCE FINAL ==========
cl_show_clan_in_death_notice 0  // No mostrar clans en kill feed
cl_teammate_colors_show 1       // Colores de equipo
mm_dedicated_search_maxping 50  // Máximo ping

// ========== ECHO CONFIRMATION ==========
host_writeconfig
echo ""
echo "================================================"
echo "  CS2 AUTOEXEC LOADED - NUCLEAR OPTIMIZATION"
echo "  TARGET: 300+ FPS | RTX 2060 | i5 8th Gen"
echo "================================================"
echo ""
echo "  FPS Limit: NONE (fps_max 0)"
echo "  Raw Input: ENABLED"
echo "  Preload: ENABLED"
echo "  Network: 128 tick optimized"
echo ""
echo "  Type 'prac' for practice config"
echo "  Jumpthrow: X key"
echo "  Clear decals: Shift (walk)"
echo ""
echo "================================================"
